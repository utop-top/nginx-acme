name: Auto Build Nginx with ACME

on:
  push:
    branches:
      - main
  # 定时任务：每天北京时间 08:00 和 20:00 各巡检一次
  schedule:
    - cron: '0 0,12 * * *'
  # 依然保留手动点击触发的能力
  workflow_dispatch:

permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # 阶段 1：云端静默巡检 (不消耗本地 Mac 算力)
  # ==========================================
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Fetch latest commit hash from official nginx-acme
        id: get-hash
        run: |
          # 抓取官方仓库主分支当前的最新 Commit SHA
          HASH=$(git ls-remote https://github.com/nginx/nginx-acme.git HEAD | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "当前官方最新 Hash: $HASH"

      - name: Check against cached hash
        id: cache
        uses: actions/cache@v4
        with:
          path: .hash-tracker
          # 将抓取到的 Hash 作为缓存的 Key。
          # 如果官方没更新，Key 不变，就能命中历史缓存；更新了则必定 Miss。
          key: upstream-hash-${{ steps.get-hash.outputs.hash }}

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" == 'workflow_dispatch' ] || [ "${{ github.event_name }}" == 'push' ]; then
            echo "手动触发或本地代码推送，强制放行构建。"
            echo "should_build=true" >> $GITHUB_OUTPUT
            touch .hash-tracker
          elif [ "${{ steps.cache.outputs.cache-hit }}" == 'true' ]; then
            echo "官方仓库未更新，终止后续构建。"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "探测到官方仓库有新代码，准备唤醒本地机器进行构建！"
            echo "should_build=true" >> $GITHUB_OUTPUT
            touch .hash-tracker
          fi

  # ==========================================
  # 阶段 2：物理机交叉编译与推送 (由阶段 1 控制)
  # ==========================================
  build-and-push:
    # 声明依赖阶段 1 的完成
    needs: check-upstream
    # 核心拦截器：只有当阶段 1 判定为 true 时，此 Job 才会被激活
    if: ${{ needs.check-upstream.outputs.should_build == 'true' }}
    runs-on: self-hosted 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Pre-build Initialization Script
        run: |
          echo "Executing front_build.sh..."
          bash front_build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-acme
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.28.0
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.nginx-buildx-cache
          cache-to: type=local,dest=/tmp/.nginx-buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.nginx-buildx-cache
          mv /tmp/.nginx-buildx-cache-new /tmp/.nginx-buildx-cache
