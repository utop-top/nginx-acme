name: Auto Build Nginx with ACME

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: self-hosted 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 使用 bash 强制执行，规避 Linux 执行权限丢失问题
      - name: Run Pre-build Initialization Script
        run: |
          echo "Executing front_build.sh..."
          bash front_build.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 登录 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成双路推送标签
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-acme
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.28.0
            type=raw,value=latest
            type=sha,format=short

      # 执行物理编译
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用 Mac 本地 SSD 高速缓存，路径与 tuwunel 隔离
          cache-from: type=local,src=/tmp/.nginx-buildx-cache
          cache-to: type=local,dest=/tmp/.nginx-buildx-cache-new,mode=max

      # 滚动清理本地缓存
      - name: Move cache
        run: |
          rm -rf /tmp/.nginx-buildx-cache
          mv /tmp/.nginx-buildx-cache-new /tmp/.nginx-buildx-cache
